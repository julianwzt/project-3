apiVersion: v1
kind: Pod
metadata:
  name: pg-db
  labels: { app: pg }
spec:
  containers:
    - name: pg
      image: postgres:15-alpine
      env: [{ name: POSTGRES_PASSWORD, value: "password_database_kamu" }]
      ports: [{ containerPort: 5432 }]
      volumeMounts: [{ name: script, mountPath: /docker-entrypoint-initdb.d }]
  volumes:
    - name: script
      configMap: { name: db-init }
---
apiVersion: v1
kind: Service
metadata:
  name: pg-svc
spec:
  type: NodePort
  selector: { app: pg }
  ports: [{ port: 5432, nodePort: 30543 }]
